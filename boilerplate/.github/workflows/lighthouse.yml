name: 🚦 Lighthouse CI

on:
  pull_request:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'styles/**'
      - 'public/**'
      - 'next.config.js'

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      # Setup environment variables pour le build
      - name: 🔐 Setup environment variables
        run: |
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-key
          NEXT_PUBLIC_SANITY_PROJECT_ID=placeholder-id
          NEXT_PUBLIC_SANITY_DATASET=production
          SANITY_API_TOKEN=placeholder-token
          RESEND_API_KEY=placeholder-resend-key
          NEXT_PUBLIC_SITE_URL=https://argenteuilbasketball.com
          EOF

      - name: 🏗️ Build Next.js app
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 🚀 Start server
        run: pnpm start &
        env:
          PORT: 3000

      - name: ⏳ Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: 🚦 Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/equipes
            http://localhost:3000/actualites
            http://localhost:3000/inscriptions
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3

      - name: 📊 Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');

            // Lecture des résultats Lighthouse
            const manifestPath = '.lighthouseci/manifest.json';
            if (!fs.existsSync(manifestPath)) {
              console.log('No Lighthouse results found');
              return;
            }

            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));

            // Créer un commentaire avec les résultats
            let comment = '## 🚦 Lighthouse CI Results\n\n';
            comment += '| URL | Performance | Accessibility | Best Practices | SEO |\n';
            comment += '|-----|-------------|---------------|----------------|-----|\n';

            for (const result of manifest) {
              const { summary } = result;
              const url = result.url.replace('http://localhost:3000', '');
              const urlDisplay = url || '/';

              const perf = Math.round(summary.performance * 100);
              const a11y = Math.round(summary.accessibility * 100);
              const bp = Math.round(summary['best-practices'] * 100);
              const seo = Math.round(summary.seo * 100);

              const perfEmoji = perf >= 90 ? '🟢' : perf >= 50 ? '🟡' : '🔴';
              const a11yEmoji = a11y >= 90 ? '🟢' : a11y >= 50 ? '🟡' : '🔴';
              const bpEmoji = bp >= 90 ? '🟢' : bp >= 50 ? '🟡' : '🔴';
              const seoEmoji = seo >= 90 ? '🟢' : seo >= 50 ? '🟡' : '🔴';

              comment += `| ${urlDisplay} | ${perfEmoji} ${perf} | ${a11yEmoji} ${a11y} | ${bpEmoji} ${bp} | ${seoEmoji} ${seo} |\n`;
            }

            comment += '\n**Score Legend:** 🟢 90-100 | 🟡 50-89 | 🔴 0-49\n';
            comment += '\n[View full Lighthouse report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';

            // Poster le commentaire
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });

      - name: 📈 Fail on low scores
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000
          uploadArtifacts: false
          temporaryPublicStorage: false
          runs: 1
          # Définir les seuils minimums
          budgetPath: .github/lighthouse-budget.json

  budget-config:
    name: Ensure Lighthouse Budget Config
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Check budget config exists
        run: |
          if [ ! -f .github/lighthouse-budget.json ]; then
            echo "⚠️  No Lighthouse budget config found"
            echo "Creating default budget config..."
            mkdir -p .github
            cat > .github/lighthouse-budget.json << 'EOF'
          {
            "ci": {
              "assert": {
                "assertions": {
                  "categories:performance": ["warn", {"minScore": 0.8}],
                  "categories:accessibility": ["error", {"minScore": 0.9}],
                  "categories:best-practices": ["warn", {"minScore": 0.85}],
                  "categories:seo": ["warn", {"minScore": 0.9}]
                }
              }
            }
          }
          EOF
          fi
