name: 🐛 Bug Report
description: Signaler un bug ou un comportement inattendu
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees:
  - AdrienPoua

body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug ! Veuillez remplir ce formulaire avec le plus de détails possible.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Une description claire et concise du problème
      placeholder: "Exemple: Le bouton d'inscription ne fonctionne pas sur mobile..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      description: Comment reproduire le problème ?
      placeholder: |
        1. Aller sur la page '...'
        2. Cliquer sur '...'
        3. Scroller jusqu'à '...'
        4. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Que devrait-il se passer normalement ?
      placeholder: "Le formulaire devrait..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement actuel
      description: Que se passe-t-il actuellement ?
      placeholder: "Au lieu de cela, je vois..."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Sévérité
      description: Quelle est la gravité de ce bug ?
      options:
        - 🔴 Critique (le site est inutilisable)
        - 🟠 Majeur (fonctionnalité importante cassée)
        - 🟡 Mineur (problème cosmétique ou workaround disponible)
        - 🟢 Trivial (très faible impact)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Navigateur
      description: Sur quel navigateur avez-vous rencontré le problème ?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Mobile Safari (iOS)
        - Chrome Mobile (Android)
        - Autre
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Type d'appareil
      description: Sur quel type d'appareil ?
      options:
        - Desktop
        - Mobile
        - Tablette
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Captures d'écran
      description: Si applicable, ajoutez des captures d'écran
      placeholder: Glissez-déposez vos images ici

  - type: textarea
    id: logs
    attributes:
      label: Console / Logs
      description: Si vous avez des erreurs dans la console (F12), copiez-les ici
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Informations complémentaires
      description: Tout autre contexte utile pour résoudre le problème
