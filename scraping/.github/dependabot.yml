version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    reviewers:
      - "AdrienPoua"
    assignees:
      - "AdrienPoua"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Grouper les mises à jour par type
    groups:
      # Groupe pour les dépendances de production
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Groupe pour les dépendances de développement
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Ignorer certaines dépendances si nécessaire
    ignore:
      # Exemple: ignorer les mises à jour majeures de Next.js (à réviser manuellement)
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # Ignorer les mises à jour majeures de React (à réviser manuellement)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    reviewers:
      - "AdrienPoua"
    assignees:
      - "AdrienPoua"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
