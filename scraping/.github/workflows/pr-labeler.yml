name: 🏷️ PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Auto-label PR
    runs-on: ubuntu-latest

    steps:
      - name: 🏷️ Apply labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: 📝 Comment on first-time contribution
        uses: actions/github-script@v7
        with:
          script: |
            // Vérifier si c'est la première contribution de l'auteur
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: context.payload.pull_request.user.login
            });

            if (prs.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Merci pour votre première contribution à Argenteuil Basketball ! 🏀\n\nVotre PR sera reviewée prochainement. N'hésitez pas à poser des questions si besoin.`
              });
            }
